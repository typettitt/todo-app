# nginx config for the SPA + API reverse proxy. The unprivileged image binds
# to 8080 by default, so we listen there too.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Defense-in-depth response headers (parity with the API). HSTS does not
    # use preload here; preload is an irreversible browser-vendor commitment.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-src 'none'; worker-src 'self'; manifest-src 'self'; form-action 'self'; frame-ancestors 'none'; base-uri 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Health endpoints live at /health/ on the API (no /api prefix). Surface
    # them under /api/health/ for the SPA so everything behind the proxy
    # shares one origin. This is the ONE intentional rewrite location — the
    # trailing slash on proxy_pass is required here so /api/health/ready
    # forwards to /health/ready on the upstream.
    location /api/health/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_pass http://api:5000/health/;
    }

    # Reverse proxy /api/ to the api service. CRITICAL: no trailing slash on
    # proxy_pass — a trailing slash causes nginx to strip the matched /api/
    # prefix and break every backend route (risk R1 from the plan).
    #
    # X-Forwarded-For / X-Forwarded-Proto are required by the API's
    # UseForwardedHeaders middleware so the rate limiter partitions by the
    # real client IP rather than the docker bridge IP. The API only honors
    # these headers when this nginx container's IP is listed in the
    # Trust:KnownProxies env var (Trust__KnownProxies in compose) — see
    # docker-compose.prod.yml and docs/decisions.md "Forwarded headers +
    # trusted proxies".
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_pass http://api:5000;
    }

    # SPA fallback — serve index.html for any client-side route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
